<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenBoard - Collaborative Whiteboard</title>

    <!-- StyleSheets -->
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <!-- Tools Toolbar -->
    <div class="tools">
      <div class="tool-items">
        <!-- Pencil Tool -->
        <div class="tool-wrapper">
          <div class="tool active-tool" id="pencil" title="Pencil">
            <div class="tool-img">
              <img
                src="./resources/icons/pencil.svg"
                alt="Pencil Tool"
              />
            </div>
            <div class="tool-options" id="pencil-options">
              <div class="size-display">Size: <span id="pencil-size-value">1</span></div>
              <div class="pencil-slider">
                <input
                  type="range"
                  name="pencil-size"
                  id="pencil-size"
                  min="1"
                  max="40"
                  value="1"
                  title="Adjust brush size"
                />
              </div>
              <div class="color-options">
                <div class="black" id="black" title="Black"></div>
                <div class="red" id="red" title="Red"></div>
                <div class="blue" id="blue" title="Blue"></div>
                <div class="yellow" id="yellow" title="Yellow"></div>
              </div>
            </div>
          </div>
          <div class="tool-label">Pencil</div>
        </div>

        <!-- Eraser Tool -->
        <div class="tool-wrapper">
          <div class="tool" id="eraser" title="Eraser">
            <div class="tool-img">
              <img
                src="./resources/icons/eraser.svg"
                alt="Eraser Tool"
              />
            </div>
            <div class="tool-options" id="eraser-options">
              <div class="size-display">Size: <span id="eraser-size-value">1</span></div>
              <div class="eraser-slider">
                <input
                  type="range"
                  name="eraser-size"
                  id="eraser-size"
                  min="1"
                  max="40"
                  value="1"
                  title="Adjust eraser size"
                />
              </div>
            </div>
          </div>
          <div class="tool-label">Eraser</div>
        </div>

        <!-- Sticky Note Tool -->
        <div class="tool-wrapper">
          <div class="tool" id="sticky" title="Sticky Note">
            <div class="tool-img">
              <img
                src="./resources/icons/sticky.svg"
                alt="Sticky Note Tool"
              />
            </div>
          </div>
          <div class="tool-label">Sticky Note</div>
        </div>

        <!-- Upload Image Tool -->
        <div class="tool-wrapper">
          <div class="tool" id="upload-img" title="Upload Image">
            <label for="upload">
              <div class="tool-img">
                <img
                  src="./resources/icons/photo.svg"
                  alt="Upload Image"
                />
              </div>

              <input
                type="file"
                name="upload"
                id="upload"
                style="display: none"
                accept="image/*"
              />
            </label>
          </div>
          <div class="tool-label">Upload Image</div>
        </div>

        <!-- Download Tool -->
        <div class="tool-wrapper">
          <div class="tool" id="download" title="Download">
            <div class="tool-img">
              <img
                src="./resources/icons/download.svg"
                alt="Download"
              />
            </div>
          </div>
          <div class="tool-label">Download</div>
        </div>

        <!-- Undo Tool -->
        <div class="tool-wrapper">
          <div class="tool" id="undo" title="Undo">
            <div class="tool-img">
              <img src="./resources/icons/undo.svg" alt="Undo" />
            </div>
          </div>
          <div class="tool-label">Undo</div>
        </div>

        <!-- Redo Tool -->
        <div class="tool-wrapper">
          <div class="tool" id="redo" title="Redo">
            <div class="tool-img">
              <img
                src="./resources/icons/redo.svg"
                alt="Redo"
              />
            </div>
          </div>
          <div class="tool-label">Redo</div>
        </div>
      </div>
    </div>

    <!-- Drawing Area -->
    <div class="drawing-area">
      <canvas id="canvas"></canvas>
    </div>

    <!-- Scripts -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"
      integrity="sha512-v8ng/uGxkge3d1IJuEo6dJP8JViyvms0cly9pnbfRxT6/31c3dRWxIiwGnMSWwZjHKOuY3EVmijs7k1jz/9bLA=="
      crossorigin="anonymous"
    ></script>
    <script>
      const socket = io.connect("https://my-whiteboard-app.herokuapp.com/");
    </script>
    <script src="./script.js"></script>
    <script src="./tools.js"></script>
    <script src="./sticky.js"></script>
    <script src="./img.js"></script>
    <script src="./util.js"></script>
    <script src="./receiver.js"></script>
  </body>
</html>
